  .language-switcher.is-open .language-switcher__button {
    border-color: #9ca3af;
    color: #111827;
    box-shadow: 0 5px 16px rgba(15, 23, 42, 0.1);
  }

  .language-switcher__icon {
    width: 1.08rem;

    flex: 0 0 auto;
  }

    height: 0.8rem;
    flex: 0 0 auto;
    transition: transform 0.15s ease;
  }

  .language-switcher.is-open .language-switcher__chevron {
    transform: rotate(180deg);
  }

  .language-switcher__menu {
    position: absolute;
    right: 0;
    top: calc(100% + 0.45rem);
    display: none;
    width: 12.25rem;

    border: 1px solid #e7e5e4;
    border-radius: 0.75rem;

    display: flex;

    align-items: center;
    justify-content: space-between;

    background: #f3f4f6;
    color: #111827;

    [`Last updated: June 2026`, `最后更新：2026 年 6 月`, `Dikemas kini: Jun 2026`],
    [`1. What we collect`, `1. 我们收集哪些资料`, `1. Data yang kami kumpulkan`],
    [`When you use CareerJobScan, we collect:`, `使用 CareerJobScan 时，我们会收集：`, `Apabila anda menggunakan CareerJobScan, kami mengumpulkan:`],
    [`Account data`, `账号资料`, `Data akaun`],
    [`— name, email address, and password (hashed).`, `— 姓名、电邮地址和经过哈希处理的密码。`, `— nama, alamat emel dan kata laluan (dihash).`],
    [`Profile data`, `个人资料`, `Data profil`],
    [`— job titles, skills, salary expectations, location preferences, and any resume you upload.`, `— 目标职位、技能、薪资期望、地点偏好，以及你上传的任何简历。`, `— jawatan, kemahiran, jangkaan gaji, lokasi pilihan dan sebarang resume yang anda muat naik.`],
    [`Usage data`, `使用资料`, `Data penggunaan`],
    [`— scans run, jobs viewed, applications tracked, and feature interactions.`, `— 运行过的扫描、查看过的岗位、追踪的申请和功能使用记录。`, `— imbasan yang dijalankan, kerja yang dilihat, permohonan yang dijejak dan interaksi ciri.`],
    [`Billing data`, `账单资料`, `Data bil`],
    [`— handled entirely by Stripe. We never store your card details.`, `— 全部由 Stripe 处理。我们不会保存你的银行卡资料。`, `— diurus sepenuhnya oleh Stripe. Kami tidak menyimpan butiran kad anda.`],
    [`AI API keys`, `AI API 密钥`, `Kunci API AI`],
    [`— if you provide your own AI API key, it is stored encrypted using AES-256 (Fernet).`, `— 如果你提供自己的 AI API 密钥，我们会使用 AES-256 (Fernet) 加密存储。`, `— jika anda menyediakan kunci API AI sendiri, ia disimpan secara terenkripsi menggunakan AES-256 (Fernet).`],
    [`2. How we use your data`, `2. 我们如何使用资料`, `2. Cara kami menggunakan data anda`],
    [`To run job scans and match listings against your profile.`, `用于运行岗位扫描，并根据你的资料匹配岗位。`, `Untuk menjalankan imbasan kerja dan memadankan iklan dengan profil anda.`],
    [`To generate AI-powered cover notes, resume suggestions, and interview prep (via our AI engine).`, `用于通过 AI 生成求职说明、简历建议和面试准备内容。`, `Untuk menjana nota iringan, cadangan resume dan persediaan temu duga berasaskan AI.`],
    [`To send you email digests of your top matches (Pro plan).`, `用于向你发送最佳匹配岗位的邮件摘要（Pro 方案）。`, `Untuk menghantar ringkasan emel padanan terbaik anda (pelan Pro).`],
    [`To process subscription payments via Stripe.`, `用于通过 Stripe 处理订阅付款。`, `Untuk memproses bayaran langganan melalui Stripe.`],
    [`To improve the accuracy of our scoring model over time.`, `用于持续提升评分模型的准确度。`, `Untuk meningkatkan ketepatan model skor kami dari semasa ke semasa.`],
    [`We do not use your data for advertising, and we do not share it with employers, recruiters, or data brokers.`, `我们不会将你的资料用于广告，也不会分享给雇主、招聘人员或数据经纪商。`, `Kami tidak menggunakan data anda untuk pengiklanan, dan tidak berkongsi dengan majikan, perekrut atau broker data.`],
    [`3. Third-party services`, `3. 第三方服务`, `3. Perkhidmatan pihak ketiga`],
    [`Supabase (PostgreSQL)`, `Supabase (PostgreSQL)`, `Supabase (PostgreSQL)`],
    [`— stores your account and profile data. Data is hosted on servers in the US and/or Singapore.`, `— 存储你的账号和个人资料。数据托管在美国和/或新加坡的服务器。`, `— menyimpan data akaun dan profil anda. Data dihoskan pada pelayan di AS dan/atau Singapura.`],
    [`Stripe`, `Stripe`, `Stripe`],
    [`— processes payments. Subject to Stripe's own privacy policy.`, `— 处理付款，并受 Stripe 自身隐私政策约束。`, `— memproses bayaran, tertakluk kepada dasar privasi Stripe sendiri.`],
    [`Resend`, `Resend`, `Resend`],
    [`— delivers transactional emails (verification, digests). Only your email address is shared.`, `— 发送交易类邮件（验证、摘要）。只会共享你的电邮地址。`, `— menghantar emel transaksi seperti pengesahan dan ringkasan. Hanya alamat emel anda dikongsi.`],
    [`Google (AI services)`, `Google（AI 服务）`, `Google (perkhidmatan AI)`],
    [`— processes job descriptions and your profile to generate scores, cover notes, and interview questions. No identifying personal data (name, contact info) is sent to Google.`, `— 处理岗位描述和你的资料，用于生成评分、求职说明和面试题。我们不会向 Google 发送可识别个人身份的资料（姓名、联系方式）。`, `— memproses deskripsi kerja dan profil anda untuk menjana skor, nota iringan dan soalan temu duga. Tiada data peribadi yang boleh mengenal pasti anda (nama, maklumat hubungan) dihantar kepada Google.`],
    [`Google OAuth`, `Google OAuth`, `Google OAuth`],
    [`— if you sign in with Google, we receive your email and display name from Google. We do not request access to any other Google data.`, `— 如果你使用 Google 登录，我们会从 Google 接收你的电邮和显示名称。我们不会请求访问其他 Google 数据。`, `— jika anda log masuk dengan Google, kami menerima emel dan nama paparan anda daripada Google. Kami tidak meminta akses kepada data Google lain.`],
    [`4. Data retention`, `4. 数据保留`, `4. Tempoh penyimpanan data`],
    [`Your data is retained for as long as your account is active. If you delete your account from Settings, all your personal data, profile, resume, and scan history is permanently deleted within 30 days.`, `只要你的账号处于活跃状态，我们会保留你的资料。如果你在设置中删除账号，所有个人资料、个人档案、简历和扫描记录会在 30 天内永久删除。`, `Data anda disimpan selagi akaun anda aktif. Jika anda memadam akaun melalui Tetapan, semua data peribadi, profil, resume dan sejarah imbasan akan dipadam secara kekal dalam masa 30 hari.`],
    [`5. Your rights`, `5. 你的权利`, `5. Hak anda`],
    [`You can access, update, or delete your profile data at any time from Settings. To request a full export or permanent deletion of your data, email us at the address below.`, `你可以随时在设置中访问、更新或删除个人资料。如需完整导出或永久删除资料，请通过下方电邮联系我们。`, `Anda boleh mengakses, mengemas kini atau memadam data profil anda pada bila-bila masa melalui Tetapan. Untuk meminta eksport penuh atau pemadaman kekal data anda, emel kami di alamat di bawah.`],
    [`6. Cookies`, `6. Cookie`, `6. Kuki`],
    [`We use a single session cookie to keep you logged in. We do not use advertising or tracking cookies.`, `我们使用一个会话 Cookie 来保持登录状态。我们不使用广告或追踪 Cookie。`, `Kami menggunakan satu kuki sesi untuk memastikan anda kekal log masuk. Kami tidak menggunakan kuki pengiklanan atau penjejakan.`],
    [`7. Changes to this policy`, `7. 政策变更`, `7. Perubahan kepada dasar ini`],
    [`We may update this policy as the service evolves. We will notify active users by email for material changes.`, `随着服务发展，我们可能会更新本政策。若有重大变更，我们会通过电邮通知活跃用户。`, `Kami mungkin mengemas kini dasar ini apabila perkhidmatan berkembang. Bagi perubahan penting, kami akan memaklumkan pengguna aktif melalui emel.`],
    [`8. Contact`, `8. 联系方式`, `8. Hubungi kami`],
    [`Questions about this policy? Email us at`, `如对本政策有疑问，请发送电邮至`, `Ada soalan tentang dasar ini? Emel kami di`],
    [`1. The service`, `1. 服务内容`, `1. Perkhidmatan`],
    [`CareerJobScan is an AI-powered job matching service for the Singapore job market. It aggregates listings from public job portals and APIs, scores them against your profile, and surfaces the best matches. It is not a recruiter or employment agency.`, `CareerJobScan 是面向新加坡求职市场的 AI 岗位匹配服务。它会汇总公开招聘平台和 API 的岗位，根据你的资料进行评分，并展示最佳匹配。CareerJobScan 不是招聘人员或职业介绍所。`, `CareerJobScan ialah perkhidmatan padanan kerja berkuasa AI untuk pasaran kerja Singapura. Ia mengumpulkan iklan daripada portal kerja awam dan API, memberi skor berdasarkan profil anda, dan memaparkan padanan terbaik. Ia bukan perekrut atau agensi pekerjaan.`],
    [`2. Your account`, `2. 你的账号`, `2. Akaun anda`],
    [`You must provide accurate information when creating your account.`, `创建账号时，你必须提供准确资料。`, `Anda mesti memberikan maklumat yang tepat semasa mencipta akaun.`],
    [`You are responsible for keeping your account credentials secure.`, `你有责任妥善保管账号凭证。`, `Anda bertanggungjawab menjaga keselamatan kelayakan akaun anda.`],
    [`You must be at least 16 years old to use this service.`, `你必须年满 16 岁才能使用本服务。`, `Anda mesti berumur sekurang-kurangnya 16 tahun untuk menggunakan perkhidmatan ini.`],
    [`One account per person. Creating multiple accounts to circumvent free plan limits is prohibited.`, `每人限一个账号。禁止创建多个账号来规避免费方案限制。`, `Satu akaun untuk setiap orang. Mencipta beberapa akaun untuk mengelak had pelan percuma adalah dilarang.`],
    [`3. Acceptable use`, `3. 可接受使用`, `3. Penggunaan yang dibenarkan`],
    [`You agree not to:`, `你同意不会：`, `Anda bersetuju untuk tidak:`],
    [`Use the service for any unlawful purpose.`, `将本服务用于任何违法目的。`, `Menggunakan perkhidmatan untuk sebarang tujuan yang menyalahi undang-undang.`],
    [`Attempt to reverse-engineer, scrape, or extract data from the service at scale.`, `尝试逆向工程、大规模抓取或提取本服务数据。`, `Cuba melakukan kejuruteraan songsang, mengikis atau mengekstrak data daripada perkhidmatan secara besar-besaran.`],
    [`Upload malicious files, scripts, or content.`, `上传恶意文件、脚本或内容。`, `Memuat naik fail, skrip atau kandungan berniat jahat.`],
    [`Interfere with or disrupt the service's infrastructure.`, `干扰或破坏本服务的基础设施。`, `Mengganggu atau menjejaskan infrastruktur perkhidmatan.`],
    [`4. Subscriptions and billing`, `4. 订阅与账单`, `4. Langganan dan bil`],
    [`The Free plan is free forever with the stated limits.`, `免费方案在所列限制内永久免费。`, `Pelan Percuma adalah percuma selamanya dengan had yang dinyatakan.`],
    [`The Pro plan is billed monthly via Stripe. Prices are shown in SGD inclusive of any applicable taxes.`, `Pro 方案通过 Stripe 按月收费。价格以新币显示，并包含适用税费。`, `Pelan Pro dibilkan setiap bulan melalui Stripe. Harga dipaparkan dalam SGD termasuk cukai yang berkenaan.`],
    [`You may cancel your subscription at any time. Your Pro access continues until the end of the billing period — no partial refunds are issued for unused time.`, `你可以随时取消订阅。Pro 权限会保留到当前账单周期结束；未使用时间不提供部分退款。`, `Anda boleh membatalkan langganan pada bila-bila masa. Akses Pro berterusan sehingga akhir tempoh bil; tiada bayaran balik separa untuk masa yang tidak digunakan.`],
    [`We reserve the right to change pricing with 30 days' notice to existing subscribers.`, `我们保留调整价格的权利，并会提前 30 天通知现有订阅用户。`, `Kami berhak mengubah harga dengan notis 30 hari kepada pelanggan sedia ada.`],
    [`5. AI-generated content`, `5. AI 生成内容`, `5. Kandungan jana AI`],
    [`Cover notes, resume suggestions, and interview questions are generated by AI and may not be accurate or appropriate for every situation. You are responsible for reviewing and editing any AI-generated content before using it. CareerJobScan makes no guarantees about the quality or outcome of applications made using our tools.`, `求职说明、简历建议和面试问题由 AI 生成，未必适用于所有情况。使用前，你有责任自行审阅和编辑任何 AI 生成内容。CareerJobScan 不保证通过本工具提交申请的质量或结果。`, `Nota iringan, cadangan resume dan soalan temu duga dijana oleh AI dan mungkin tidak tepat atau sesuai untuk setiap situasi. Anda bertanggungjawab menyemak dan mengedit sebarang kandungan jana AI sebelum menggunakannya. CareerJobScan tidak menjamin kualiti atau hasil permohonan yang dibuat menggunakan alat kami.`],
    [`6. Job listings`, `6. 岗位信息`, `6. Iklan kerja`],
    [`CareerJobScan aggregates listings from third-party sources (MyCareersFuture, Indeed, Adzuna, RemoteOK). We do not verify the accuracy, legitimacy, or availability of individual listings. Always verify a role directly on the employer's website before applying.`, `CareerJobScan 汇总来自第三方来源（MyCareersFuture、Indeed、Adzuna、RemoteOK）的岗位。我们不验证单个岗位的准确性、真实性或是否仍开放。申请前，请务必直接在雇主网站核实。`, `CareerJobScan mengumpulkan iklan daripada sumber pihak ketiga (MyCareersFuture, Indeed, Adzuna, RemoteOK). Kami tidak mengesahkan ketepatan, kesahihan atau ketersediaan setiap iklan. Sentiasa sahkan peranan secara langsung di laman web majikan sebelum memohon.`],
    [`7. Intellectual property`, `7. 知识产权`, `7. Harta intelek`],
    [`The CareerJobScan platform, scoring model, and UI are owned by CareerJobScan. You retain ownership of your resume and profile data. You grant CareerJobScan a limited licence to process your data solely to provide the service.`, `CareerJobScan 平台、评分模型和界面归 CareerJobScan 所有。你的简历和个人资料仍归你所有。你授予 CareerJobScan 有限许可，仅用于提供本服务而处理你的资料。`, `Platform CareerJobScan, model skor dan UI dimiliki oleh CareerJobScan. Anda kekal memiliki resume dan data profil anda. Anda memberi CareerJobScan lesen terhad untuk memproses data anda semata-mata bagi menyediakan perkhidmatan.`],
    [`8. Limitation of liability`, `8. 责任限制`, `8. Had liabiliti`],
    [`CareerJobScan is provided "as is." We are not liable for any direct, indirect, or consequential damages arising from your use of the service, missed job opportunities, or reliance on AI-generated content. Our total liability to you in any month is capped at the amount you paid us in that month.`, `CareerJobScan 按“现状”提供。对于因使用本服务、错失求职机会或依赖 AI 生成内容而产生的任何直接、间接或后果性损失，我们不承担责任。我们在任何月份对你的总责任以你当月向我们支付的金额为上限。`, `CareerJobScan disediakan "seadanya." Kami tidak bertanggungjawab atas sebarang kerugian langsung, tidak langsung atau berbangkit daripada penggunaan perkhidmatan, peluang kerja yang terlepas, atau pergantungan pada kandungan jana AI. Jumlah liabiliti kami kepada anda dalam mana-mana bulan dihadkan kepada jumlah yang anda bayar kepada kami pada bulan tersebut.`],
    [`9. Service availability`, `9. 服务可用性`, `9. Ketersediaan perkhidmatan`],
    [`We aim for high availability but do not guarantee uninterrupted service. We may suspend or terminate accounts that violate these terms without notice.`, `我们力求保持高可用性，但不保证服务不中断。对于违反本条款的账号，我们可能会在不另行通知的情况下暂停或终止。`, `Kami menyasarkan ketersediaan tinggi tetapi tidak menjamin perkhidmatan tanpa gangguan. Kami boleh menggantung atau menamatkan akaun yang melanggar terma ini tanpa notis.`],
    [`10. Changes to these terms`, `10. 条款变更`, `10. Perubahan kepada terma ini`],
    [`We may update these terms from time to time. We will notify active subscribers by email of material changes. Continued use of the service after the effective date constitutes acceptance of the updated terms.`, `我们可能会不时更新本条款。若有重大变更，我们会通过电邮通知活跃订阅用户。生效日期后继续使用本服务，即表示你接受更新后的条款。`, `Kami mungkin mengemas kini terma ini dari semasa ke semasa. Kami akan memaklumkan pelanggan aktif melalui emel tentang perubahan penting. Penggunaan berterusan selepas tarikh berkuat kuasa bermaksud anda menerima terma yang dikemas kini.`],
    [`11. Governing law`, `11. 适用法律`, `11. Undang-undang yang terpakai`],

  const dictionaries = { zh: {}, ms: {} };
  for (const [en, zh, ms] of rows) {
    dictionaries.zh[normalize(en)] = zh;
    dictionaries.ms[normalize(en)] = ms;
  }

  const patterns = [
    [/^Closes in (\d+) days$/, (m, lang) => lang === 'zh' ? `${m[1]} 天后截止` : `Tutup dalam ${m[1]} hari`],
    [/^Closes today$/, (m, lang) => lang === 'zh' ? `今天截止` : `Tutup hari ini`],
    [/^Closes tomorrow$/, (m, lang) => lang === 'zh' ? `明天截止` : `Tutup esok`],
    [/^Closes (.+)$/, (m, lang) => lang === 'zh' ? `截止：${m[1]}` : `Tutup pada ${m[1]}`],
    [/^(\d+) of (\d+) users$/, (m, lang) => lang === 'zh' ? `${m[1]} / ${m[2]} 位用户` : `${m[1]} daripada ${m[2]} pengguna`],
    [/^Mode "(.+)" created!$/, (m, lang) => lang === 'zh' ? `模式“${m[1]}”已创建！` : `Mod "${m[1]}" telah dicipta!`],
    [/^Schedule error: (.+)$/, (m, lang) => lang === 'zh' ? `定时设置错误：${m[1]}` : `Ralat jadual: ${m[1]}`],
    [/^(\d+) scans? left today$/, (m, lang) => lang === 'zh' ? `今天还剩 ${m[1]} 次扫描` : `Tinggal ${m[1]} imbasan hari ini`],
  ];

  const textOriginals = new WeakMap();
  const supported = new Set(Object.keys(LANGUAGES));
  let pageOverrideLanguage = null;
  const attrs = ['placeholder', 'title', 'aria-label'];
  const attrKeys = {
    placeholder: 'i18nOriginalPlaceholder',
    title: 'i18nOriginalTitle',
    'aria-label': 'i18nOriginalAriaLabel',
    content: 'i18nOriginalContent',
  };
  const originalDocumentTitle = document.title;

  function normalize(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function preserveWhitespace(currentValue, translatedValue) {
    const value = String(currentValue || '');
    const prefix = value.match(/^\s*/)?.[0] || '';
    const suffix = value.match(/\s*$/)?.[0] || '';
    return prefix + translatedValue + suffix;
  }

  function getStoredLanguage() {
    if (pageOverrideLanguage && supported.has(pageOverrideLanguage)) return pageOverrideLanguage;
    const pageDefaultLanguage = document.body?.dataset.languageDefault;
    if (pageDefaultLanguage && supported.has(pageDefaultLanguage)) return pageDefaultLanguage;

    let stored = '';
    try {
      stored = localStorage.getItem('careerjobscan.lang') || '';
    } catch (_) {}
    if (!stored) {
      stored = (document.cookie.match(/(?:^|;\s*)careerjobscan_lang=([^;]+)/) || [])[1] || '';
    }
    return supported.has(stored) ? stored : 'en';
  }

  function setStoredLanguage(lang) {
    try {
      localStorage.setItem('careerjobscan.lang', lang);
    } catch (_) {}
    document.cookie = `careerjobscan_lang=${lang};path=/;max-age=31536000;samesite=lax`;
  }

  function hasKnownSource(value) {
    const key = normalize(value);
    return Boolean(dictionaries.zh[key] || dictionaries.ms[key] || patterns.some(([pattern]) => pattern.test(key)));
  }

  function translate(value, lang) {
    const key = normalize(value);
    if (!key || lang === 'en') return key;
    const exact = dictionaries[lang]?.[key];
    if (exact) return exact;
    for (const [pattern, fn] of patterns) {
      const match = key.match(pattern);
      if (match) return fn(match, lang);
    }
    return key;
  }

  function shouldSkipElement(element) {
    return !element || Boolean(element.closest('[data-i18n-skip], [data-i18n-ignore], script, style, code, pre'));
  }

  function processTextNode(node, lang) {
    if (!node.nodeValue || !node.nodeValue.trim()) return;
    const parent = node.parentElement;
    if (shouldSkipElement(parent)) return;

    const current = node.nodeValue;
    const previous = textOriginals.get(node);
    let original = previous || current;

    if (previous) {
      const currentKey = normalize(current);
      const expectedForPrevious = normalize(translate(previous, lang));
      const previousKey = normalize(previous);
      if (hasKnownSource(current) && currentKey !== expectedForPrevious && currentKey !== previousKey) {
        original = current;
      }
    }

    textOriginals.set(node, original);
    const translated = translate(original, lang);
    const next = preserveWhitespace(current, translated);
    if (node.nodeValue !== next) node.nodeValue = next;
  }

  function processElementAttrs(element, lang) {
    if (shouldSkipElement(element)) return;
    for (const attr of attrs) {
      if (!element.hasAttribute(attr)) continue;
      const current = element.getAttribute(attr);
      const dataKey = attrKeys[attr];
      const previous = element.dataset[dataKey];
      let original = previous || current;

      if (previous) {
        const currentKey = normalize(current);
        const expectedForPrevious = normalize(translate(previous, lang));
        const previousKey = normalize(previous);
        if (hasKnownSource(current) && currentKey !== expectedForPrevious && currentKey !== previousKey) {
          original = current;
        }
      }

      element.dataset[dataKey] = original;
      const translated = translate(original, lang);
      if (current !== translated) element.setAttribute(attr, translated);
    }
  }

  function processMeta(lang) {
    const metas = document.querySelectorAll('meta[name="description"], meta[property="og:title"], meta[property="og:description"], meta[name="twitter:title"], meta[name="twitter:description"]');
    metas.forEach((meta) => {
      const current = meta.getAttribute('content') || '';
      const previous = meta.dataset[attrKeys.content];
      let original = previous || current;
      if (previous && hasKnownSource(current)) original = current;
      meta.dataset[attrKeys.content] = original;
      const translated = translate(original, lang);
      if (current !== translated) meta.setAttribute('content', translated);
    });
  }

  function updateSwitchers(lang) {
    document.querySelectorAll('[data-language-switcher]').forEach((switcher) => {
      const current = switcher.querySelector('[data-language-current]');
      if (current) current.textContent = LANGUAGES[lang].label;
      const toggle = switcher.querySelector('[data-language-toggle]');
      if (toggle) {
        toggle.setAttribute('aria-expanded', switcher.classList.contains('is-open') ? 'true' : 'false');
        const ariaPrefix = lang === 'zh' ? '语言' : (lang === 'ms' ? 'Bahasa' : 'Language');
        toggle.setAttribute('aria-label', `${ariaPrefix}: ${LANGUAGES[lang].label}`);
      }
      switcher.querySelectorAll('[data-language-option]').forEach((option) => {
        option.setAttribute('aria-current', option.dataset.languageOption === lang ? 'true' : 'false');
      });
    });
  }

  function walk(root, lang) {
    if (!root) return;
    if (root.nodeType === Node.TEXT_NODE) {
      processTextNode(root, lang);
      return;
    }
    if (root.nodeType !== Node.ELEMENT_NODE && root.nodeType !== Node.DOCUMENT_NODE) return;

    if (root.nodeType === Node.ELEMENT_NODE) processElementAttrs(root, lang);
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT | NodeFilter.SHOW_ELEMENT);
    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (node.nodeType === Node.TEXT_NODE) processTextNode(node, lang);
      else processElementAttrs(node, lang);
    }
  }

  let applying = false;
  function applyTranslations(root) {
    const lang = getStoredLanguage();
    applying = true;
    document.documentElement.lang = LANGUAGES[lang].htmlLang;
    document.documentElement.dataset.language = lang;
    const translatedTitle = translate(originalDocumentTitle, lang);
    if (document.title !== translatedTitle) document.title = translatedTitle;
    processMeta(lang);
    walk(root || document.body, lang);
    updateSwitchers(lang);
    applying = false;
  }

  function chooseLanguage(lang) {
    if (!supported.has(lang)) return;
    pageOverrideLanguage = lang;
    setStoredLanguage(lang);
    document.querySelectorAll('[data-language-switcher]').forEach((switcher) => switcher.classList.remove('is-open'));
    applyTranslations(document.body);
    window.dispatchEvent(new CustomEvent('careerjobscan:languagechange', { detail: { language: lang } }));
  }

  function initSwitchers() {
    document.querySelectorAll('[data-language-switcher]').forEach((switcher) => {
      const toggle = switcher.querySelector('[data-language-toggle]');
      toggle?.addEventListener('click', (event) => {
        event.stopPropagation();
        const nextOpen = !switcher.classList.contains('is-open');
        document.querySelectorAll('[data-language-switcher]').forEach((other) => other.classList.remove('is-open'));
        switcher.classList.toggle('is-open', nextOpen);
        updateSwitchers(getStoredLanguage());
      });
      switcher.querySelectorAll('[data-language-option]').forEach((option) => {
        option.addEventListener('click', (event) => {
          event.stopPropagation();
          chooseLanguage(option.dataset.languageOption);
        });
      });
    });
  }

  let observerQueued = false;
  function queueApply() {
    if (applying || observerQueued) return;
    observerQueued = true;
    requestAnimationFrame(() => {
      observerQueued = false;
      applyTranslations(document.body);
    });
  }

  const nativeConfirm = window.confirm.bind(window);
  window.confirm = function (message) {
    return nativeConfirm(translate(message, getStoredLanguage()));
  };

  window.CareerJobScanI18n = {
    apply: applyTranslations,
    setLanguage: chooseLanguage,
    getLanguage: getStoredLanguage,
    translate: (value) => translate(value, getStoredLanguage()),
  };

  document.addEventListener('click', () => {
    document.querySelectorAll('[data-language-switcher]').forEach((switcher) => switcher.classList.remove('is-open'));
    updateSwitchers(getStoredLanguage());
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      document.querySelectorAll('[data-language-switcher]').forEach((switcher) => switcher.classList.remove('is-open'));
      updateSwitchers(getStoredLanguage());
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    initSwitchers();
    applyTranslations(document.body);
    new MutationObserver(queueApply).observe(document.body, {
      childList: true,
      characterData: true,
      subtree: true,
      attributes: true,
      attributeFilter: attrs,
    });
  });
})();
