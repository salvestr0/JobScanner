<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CareerJobScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <a href="/" class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-amber-500 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </a>
      <h1 class="text-2xl font-semibold text-stone-900">Set new password</h1>
      <p class="text-stone-500 text-sm mt-1">Choose a strong password for your account</p>
    </div>

    <!-- Invalid / missing token -->
    <div id="invalid-token" class="hidden bg-white border border-stone-200 rounded-2xl p-6 shadow-sm text-center">
      <svg class="w-10 h-10 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-stone-900 font-semibold mb-1">Invalid or expired link</p>
      <p class="text-stone-500 text-sm mb-4">This reset link has expired or already been used.</p>
      <a href="/forgot-password"
        class="inline-block px-5 py-2.5 bg-amber-500 hover:bg-amber-400 text-white text-sm font-semibold rounded-lg transition-colors">
        Request a new link
      </a>
    </div>

    <!-- Reset form -->
    <div id="reset-card" class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm">
      <div id="error-msg" class="hidden mb-4 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm"></div>

      <form id="reset-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1.5">New password</label>
          <input id="password" type="password" required autocomplete="new-password" minlength="8"
                 class="w-full px-3 py-2.5 rounded-lg bg-white border border-stone-200
                        text-stone-900 placeholder-stone-400 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                 placeholder="At least 8 characters">
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1.5">Confirm password</label>
          <input id="confirm" type="password" required autocomplete="new-password"
                 class="w-full px-3 py-2.5 rounded-lg bg-white border border-stone-200
                        text-stone-900 placeholder-stone-400 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                 placeholder="Repeat your new password">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full py-2.5 px-4 rounded-lg bg-amber-500 hover:bg-amber-400
                       text-white text-sm font-semibold transition-colors
                       disabled:opacity-50 disabled:cursor-not-allowed">
          Set new password
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-stone-500 mt-4">
      <a href="/login" class="text-amber-600 hover:text-amber-500 font-medium">← Back to sign in</a>
    </p>
  </div>

  <script>
    const token = "{{ token }}";

    if (!token) {
      document.getElementById('reset-card').classList.add('hidden');
      document.getElementById('invalid-token').classList.remove('hidden');
    }

    const form   = document.getElementById('reset-form');
    const errEl  = document.getElementById('error-msg');
    const btn    = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters';
        errEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (res.ok) {
          window.location = '/login?reset=1';
        } else {
          errEl.textContent = data.error || 'Something went wrong';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Set new password';

          if (res.status === 400 && data.error?.includes('expired')) {
            document.getElementById('reset-card').classList.add('hidden');
            document.getElementById('invalid-token').classList.remove('hidden');
          }
        }
      } catch {
        errEl.textContent = 'Network error — please try again';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
