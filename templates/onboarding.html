<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — CareerScan</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/careerscan-logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <style>
    body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }
    .tag { display:inline-flex; align-items:center; gap:4px; background:#FEF3C7; color:#92400E;
           font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; border:1px solid #FDE68A; }
    .tag button { line-height:1; color:#D97706; font-size:14px; }
    .tag button:hover { color:#92400E; }
    [x-cloak] { display:none !important; }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/careerscan-theme.css') }}">
</head>
<body class="cs-onboarding min-h-screen bg-stone-50 flex flex-col items-center justify-center p-4"
  x-data="wizard()" x-init="init()">

  <!-- Header -->
  <div class="w-full max-w-lg mb-8">
    <div class="flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <img src="{{ url_for('static', filename='images/careerscan-logo.png') }}" alt="CareerScan logo" class="brand-logo-img brand-logo-img--nav">
        <span class="text-stone-900 font-semibold text-sm">CareerScan</span>
      </a>
      <a href="/app" class="text-stone-400 hover:text-stone-600 text-xs font-medium transition-colors">Skip setup →</a>
    </div>
  </div>

  <!-- Card -->
  <div class="w-full max-w-lg">
    <div class="setup-card bg-white border border-stone-200 rounded-2xl p-7 shadow-sm">
      <p class="setup-kicker text-amber-600 text-xs font-semibold uppercase tracking-widest mb-2">Quick Setup</p>
      <h2 class="text-stone-900 text-xl font-semibold mb-1">What jobs are you looking for?</h2>
      <p class="text-stone-500 text-sm mb-6">Add job titles to search for. You can change these anytime in Settings.</p>

      <!-- Target Titles -->
      <div class="mb-5">
        <label class="block text-stone-700 text-sm font-medium mb-2">Job Titles</label>
        <div class="flex flex-wrap gap-2 mb-2 min-h-[28px]">
          <template x-for="(t, i) in titles" :key="i">
            <span class="tag">
              <span x-text="t"></span>
              <button @click="titles.splice(i,1)" aria-label="Remove">&times;</button>
            </span>
          </template>
        </div>
        <div class="flex gap-2">
          <input x-model="newTitle" type="text" placeholder="Type a job title…"
            @keydown.enter.prevent="addTitle()"
            class="flex-1 px-3 py-2.5 rounded-xl bg-white border border-stone-200 text-stone-900
                   placeholder-stone-400 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
          <button @click="addTitle()"
            class="px-4 py-2.5 bg-amber-500 hover:bg-amber-400 text-white text-sm font-semibold rounded-xl transition-colors">
            Add
          </button>
        </div>
        <div class="mt-2.5">
          <p class="text-stone-400 text-xs mb-1.5">Suggestions — click to add:</p>
          <div class="flex flex-wrap gap-1.5">
            <template x-for="s in titleSuggestions.filter(s => !titles.includes(s))" :key="s">
              <button @click="titles.push(s)"
                class="px-2.5 py-1 rounded-full bg-stone-50 hover:bg-amber-50 border border-stone-200 hover:border-amber-300
                       text-stone-500 hover:text-amber-700 text-xs font-medium transition-colors">
                + <span x-text="s"></span>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Preferred Keywords -->
      <div class="mb-6">
        <label class="block text-stone-700 text-sm font-medium mb-2">Boost Keywords <span class="text-stone-400 font-normal">(optional)</span></label>
        <div class="flex flex-wrap gap-2 mb-2 min-h-[28px]">
          <template x-for="(k, i) in prefKws" :key="i">
            <span class="tag">
              <span x-text="k"></span>
              <button @click="prefKws.splice(i,1)" aria-label="Remove">&times;</button>
            </span>
          </template>
        </div>
        <div class="flex gap-2">
          <input x-model="newPrefKw" type="text" placeholder="Type a keyword…"
            @keydown.enter.prevent="addPrefKw()"
            class="flex-1 px-3 py-2.5 rounded-xl bg-white border border-stone-200 text-stone-900
                   placeholder-stone-400 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
          <button @click="addPrefKw()"
            class="px-4 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 text-sm font-semibold rounded-xl transition-colors">
            Add
          </button>
        </div>
        <div class="mt-2.5">
          <p class="text-stone-400 text-xs mb-1.5">Suggestions — click to add:</p>
          <div class="flex flex-wrap gap-1.5">
            <template x-for="s in kwSuggestions.filter(s => !prefKws.includes(s))" :key="s">
              <button @click="prefKws.push(s)"
                class="px-2.5 py-1 rounded-full bg-stone-50 hover:bg-amber-50 border border-stone-200 hover:border-amber-300
                       text-stone-500 hover:text-amber-700 text-xs font-medium transition-colors">
                + <span x-text="s"></span>
              </button>
            </template>
          </div>
        </div>
        <p class="text-stone-400 text-xs mt-2">Jobs mentioning these keywords score higher.</p>
      </div>

      <!-- Error -->
      <div x-show="err" x-cloak class="mb-4 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm" x-text="err"></div>

      <button @click="finish()" :disabled="saving || titles.length === 0"
        class="w-full py-3 bg-amber-500 hover:bg-amber-400 disabled:opacity-50 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
        <svg x-show="saving" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span x-text="saving ? 'Saving…' : 'Start scanning'"></span>
      </button>
    </div>
  </div>

<script>
function wizard() {
  return {
    saving: false,
    err: '',
    titles: [],
    prefKws: [],
    newTitle: '',
    newPrefKw: '',
    titleSuggestions: [
      'Data Analyst', 'Business Analyst', 'Operations Analyst', 'Junior Analyst',
      'IT Analyst', 'Research Analyst', 'Marketing Executive', 'HR Executive',
      'Finance Executive', 'Admin Executive', 'Customer Service Officer',
      'Sales Executive', 'Project Coordinator', 'Software Developer',
    ],
    kwSuggestions: [
      'sql', 'excel', 'python', 'power bi', 'tableau', 'entry level', 'junior',
      'fresh grad', 'hybrid', 'work from home', 'data entry', 'reporting',
      'microsoft office', 'no experience required',
    ],

    async init() {
      try {
        const cfg = await (await fetch('/api/config')).json();
        if (cfg.target_titles?.length)      this.titles  = cfg.target_titles;
        if (cfg.preferred_keywords?.length)  this.prefKws = cfg.preferred_keywords;
      } catch(_){}
    },

    addTitle() {
      const v = this.newTitle.trim();
      if (v && !this.titles.includes(v)) this.titles.push(v);
      this.newTitle = '';
    },
    addPrefKw() {
      const v = this.newPrefKw.trim().toLowerCase();
      if (v && !this.prefKws.includes(v)) this.prefKws.push(v);
      this.newPrefKw = '';
    },

    async finish() {
      if (!this.titles.length) { this.err = 'Add at least one job title'; return; }
      this.err = ''; this.saving = true;
      try {
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_titles: this.titles, preferred_keywords: this.prefKws }),
        });
        if (r.ok) { window.location = '/app'; }
        else { this.err = 'Save failed — please try again'; }
      } catch(_) { this.err = 'Network error'; }
      this.saving = false;
    },
  };
}
</script>
</body>
</html>
