<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Job Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <style>
    body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }
    .tag { display:inline-flex; align-items:center; gap:4px; background:#EEF2FF; color:#4338CA;
           font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; }
    .tag button { line-height:1; color:#818CF8; font-size:14px; }
    .tag button:hover { color:#4338CA; }
    [x-cloak] { display:none !important; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4"
  x-data="wizard()" x-init="init()">

  <!-- Header -->
  <div class="w-full max-w-lg mb-8">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </div>
        <span class="text-white font-semibold text-sm">Job Scanner</span>
      </div>
      <a href="/app" class="text-slate-500 hover:text-slate-300 text-xs font-medium transition-colors">Skip setup →</a>
    </div>
  </div>

  <!-- Card -->
  <div class="w-full max-w-lg">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-7 shadow-xl">
      <p class="text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-2">Quick Setup</p>
      <h2 class="text-white text-xl font-semibold mb-1">What jobs are you looking for?</h2>
      <p class="text-slate-400 text-sm mb-6">Add job titles to search for. You can change these anytime in Settings.</p>

      <!-- Target Titles -->
      <div class="mb-5">
        <label class="block text-slate-300 text-sm font-medium mb-2">Job Titles</label>
        <div class="flex flex-wrap gap-2 mb-2 min-h-[28px]">
          <template x-for="(t, i) in titles" :key="i">
            <span class="tag">
              <span x-text="t"></span>
              <button @click="titles.splice(i,1)" aria-label="Remove">&times;</button>
            </span>
          </template>
        </div>
        <div class="flex gap-2">
          <input x-model="newTitle" type="text" placeholder="e.g. Data Analyst"
            @keydown.enter.prevent="addTitle()"
            class="flex-1 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-white
                   placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
          <button @click="addTitle()"
            class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-xl transition-colors">
            Add
          </button>
        </div>
        <p class="text-slate-500 text-xs mt-1.5">Press Enter or click Add. We'll search each title separately.</p>
      </div>

      <!-- Preferred Keywords -->
      <div class="mb-6">
        <label class="block text-slate-300 text-sm font-medium mb-2">Boost Keywords <span class="text-slate-500 font-normal">(optional)</span></label>
        <div class="flex flex-wrap gap-2 mb-2 min-h-[28px]">
          <template x-for="(k, i) in prefKws" :key="i">
            <span class="tag">
              <span x-text="k"></span>
              <button @click="prefKws.splice(i,1)" aria-label="Remove">&times;</button>
            </span>
          </template>
        </div>
        <div class="flex gap-2">
          <input x-model="newPrefKw" type="text" placeholder="e.g. SQL, Excel, Python"
            @keydown.enter.prevent="addPrefKw()"
            class="flex-1 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-white
                   placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
          <button @click="addPrefKw()"
            class="px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold rounded-xl transition-colors">
            Add
          </button>
        </div>
        <p class="text-slate-500 text-xs mt-1.5">Jobs mentioning these keywords score higher.</p>
      </div>

      <!-- Error -->
      <div x-show="err" x-cloak class="mb-4 px-3 py-2 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm" x-text="err"></div>

      <button @click="finish()" :disabled="saving || titles.length === 0"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
        <svg x-show="saving" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span x-text="saving ? 'Saving…' : 'Start scanning'"></span>
      </button>
    </div>
  </div>

<script>
function wizard() {
  return {
    saving: false,
    err: '',
    titles: [
      'Data Analyst', 'Business Analyst', 'Operations Analyst',
      'Reporting Analyst', 'Junior Analyst', 'Analytics Associate',
    ],
    prefKws: ['sql', 'excel', 'python', 'power bi', 'junior', 'entry level'],
    newTitle: '',
    newPrefKw: '',

    async init() {
      try {
        const cfg = await (await fetch('/api/config')).json();
        if (cfg.target_titles?.length)      this.titles  = cfg.target_titles;
        if (cfg.preferred_keywords?.length)  this.prefKws = cfg.preferred_keywords;
      } catch(_){}
    },

    addTitle() {
      const v = this.newTitle.trim();
      if (v && !this.titles.includes(v)) this.titles.push(v);
      this.newTitle = '';
    },
    addPrefKw() {
      const v = this.newPrefKw.trim().toLowerCase();
      if (v && !this.prefKws.includes(v)) this.prefKws.push(v);
      this.newPrefKw = '';
    },

    async finish() {
      if (!this.titles.length) { this.err = 'Add at least one job title'; return; }
      this.err = ''; this.saving = true;
      try {
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_titles: this.titles, preferred_keywords: this.prefKws }),
        });
        if (r.ok) { window.location = '/app'; }
        else { this.err = 'Save failed — please try again'; }
      } catch(_) { this.err = 'Network error'; }
      this.saving = false;
    },
  };
}
</script>
</body>
</html>
