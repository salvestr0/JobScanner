<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — CareerJobScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <a href="/" class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-amber-500 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </a>
      <h1 class="text-2xl font-semibold text-stone-900">Forgot password?</h1>
      <p class="text-stone-500 text-sm mt-1">Enter your email and we'll send a reset link</p>
    </div>

    <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm">

      <div id="success-msg" class="hidden mb-4 px-3 py-2.5 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm">
        If an account exists for that email, a reset link is on its way. Check your inbox.
      </div>
      <div id="error-msg" class="hidden mb-4 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm"></div>

      <form id="forgot-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1.5">Email</label>
          <input id="email" type="email" required autocomplete="email"
                 class="w-full px-3 py-2.5 rounded-lg bg-white border border-stone-200
                        text-stone-900 placeholder-stone-400 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                 placeholder="you@example.com">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full py-2.5 px-4 rounded-lg bg-amber-500 hover:bg-amber-400
                       text-white text-sm font-semibold transition-colors
                       disabled:opacity-50 disabled:cursor-not-allowed">
          Send reset link
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-stone-500 mt-4">
      <a href="/login" class="text-amber-600 hover:text-amber-500 font-medium">← Back to sign in</a>
    </p>
  </div>

  <script>
    const form    = document.getElementById('forgot-form');
    const errEl   = document.getElementById('error-msg');
    const succEl  = document.getElementById('success-msg');
    const btn     = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      succEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
        });
        form.classList.add('hidden');
        succEl.classList.remove('hidden');
      } catch {
        errEl.textContent = 'Network error — please try again';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
