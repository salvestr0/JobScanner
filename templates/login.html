<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Job Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-white">Job Scanner</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
      <div id="error-msg" class="hidden mb-4 px-3 py-2 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input id="email" type="email" required autocomplete="email"
                 class="w-full px-3 py-2.5 rounded-lg bg-slate-800 border border-slate-700
                        text-white placeholder-slate-500 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
                 class="w-full px-3 py-2.5 rounded-lg bg-slate-800 border border-slate-700
                        text-white placeholder-slate-500 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="••••••••">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full py-2.5 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-500
                       text-white text-sm font-semibold transition-colors
                       disabled:opacity-50 disabled:cursor-not-allowed">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-4">
      Don't have an account?
      <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-medium">Create one</a>
    </p>
  </div>

  <script>
    const form   = document.getElementById('login-form');
    const errEl  = document.getElementById('error-msg');
    const btn    = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location = '/app';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        errEl.textContent = 'Network error — please try again';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
